name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 2-14 * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping render health endpoint
        env:
          RENDER_HEALTH_URL: https://chigetting.onrender.com/api/health
        run: |
          curl --fail --silent --show-error --location "$RENDER_HEALTH_URL" > /tmp/render-health.json
          cat /tmp/render-health.json
