<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#101118">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
  <title>취겟팅</title>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="mini-label">업데이트</div>
        <div id="topbarUpdatedAt" class="mini-value">확인 중</div>
      </div>
      <button id="manualRunBtn" class="topbar-link" type="button">바로 갱신</button>
    </header>

    <nav class="tabbar">
      <button class="tab-btn active" data-tab="home" type="button">홈</button>
      <button class="tab-btn" data-tab="schedule" type="button">일정</button>
      <button class="tab-btn" data-tab="alerts" type="button">알림</button>
      <button class="tab-btn" data-tab="settings" type="button">설정</button>
    </nav>

    <section id="page-home" class="page active">
      <section class="hero-card">
        <div class="hero-label">다음 두산 잠실 경기</div>
        <div id="nextGameText" class="hero-title">일정을 불러오는 중입니다.</div>
        <div class="countdown-grid">
          <div class="count-cell"><div id="countDays" class="count-value">00</div><div class="count-label">일</div></div>
          <div class="count-cell"><div id="countHours" class="count-value">00</div><div class="count-label">시간</div></div>
          <div class="count-cell"><div id="countMinutes" class="count-value">00</div><div class="count-label">분</div></div>
          <div class="count-cell"><div id="countSeconds" class="count-value">00</div><div class="count-label">초</div></div>
        </div>
      </section>

      <section class="section-block">
        <div class="section-title">오늘 현황</div>
        <div class="status-grid">
          <article class="status-card"><div id="statPolls" class="status-value blue">0</div><div class="status-label">조회</div></article>
          <article class="status-card"><div id="statCancel" class="status-value red">0</div><div class="status-label">취소표</div></article>
          <article class="status-card"><div id="statConsecutive" class="status-value gold">0</div><div class="status-label">연석</div></article>
          <article class="status-card"><div id="statTransfer" class="status-value green">0</div><div class="status-label">기타</div></article>
        </div>
      </section>

      <section class="section-block">
        <div id="monitoringSummary" class="section-title accent">두산 잠실 경기 모니터링 (0경기)</div>
        <div id="homeGamesList" class="card-list"></div>
      </section>

      <section class="section-block">
        <div class="section-title">최근 알림</div>
        <div id="liveAlert" class="live-alert empty">아직 수신된 알림이 없습니다.</div>
        <div id="recentAlertsList" class="card-list compact"></div>
      </section>
    </section>

    <section id="page-schedule" class="page">
      <section class="section-block">
        <div class="section-title">감시 대상 경기 전체 일정</div>
        <div id="scheduleList" class="card-list"></div>
      </section>
    </section>

    <section id="page-alerts" class="page">
      <section class="section-block">
        <div class="section-title">알림 내역</div>
        <div id="alertsList" class="card-list"></div>
      </section>
    </section>

    <section id="page-settings" class="page">
      <section class="section-block">
        <div class="section-title">알림 설정</div>
        <div class="settings-card actions">
          <input id="apiBaseInput" type="hidden" value="">
          <button id="saveApiBaseBtn" type="button" hidden>서버 주소 저장</button>
          <button id="enableAlertsBtn" class="primary-btn" type="button">알림 권한 허용</button>
          <button id="sendTestNotificationBtn" class="secondary-btn" type="button">알림 테스트</button>
        </div>

        <div class="debug-panel">
          <div class="debug-row"><span>서버 상태</span><strong id="serverStatus">확인 중</strong></div>
          <div class="debug-row"><span>실시간 연결</span><strong id="streamBadge">대기 중</strong></div>
          <div class="debug-row"><span>최근 실행</span><strong id="lastRunAt">-</strong></div>
          <div class="debug-row"><span>감시 경기 수</span><strong id="watchedGames">0</strong></div>
          <div class="debug-row"><span>누적 알림 수</span><strong id="alertCount">0</strong></div>
          <div class="debug-row multiline"><span>연결 메시지</span><strong id="backendStatus">백엔드 상태를 확인하는 중입니다.</strong></div>
          <div class="debug-row multiline"><span>알림 상태</span><strong id="permissionStatus">알림 권한 상태를 확인하는 중입니다.</strong></div>
        </div>
      </section>
    </section>
  </main>

  <script src="./runtime-config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
